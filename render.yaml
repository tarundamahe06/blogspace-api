services:
  - type: web
    name: blogspace-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DB_NAME
        fromDatabase:
          name: blogspace-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: blogspace-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blogspace-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: blogspace-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blogspace-db
          property: port

databases:
  - name: blogspace-db
    databaseName: blogspace
    user: blogspace